[data-theme="github-dark"] {

  --yellow: #d29922;

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .3s, color .3s; }

.header { background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
.header h1 { font-size: 1.4em; }
.header h1 span { color: var(--purple); }
.header-stats { display: flex; gap: 24px; font-size: 0.85em; }
.header-stat { text-align: center; }
.header-stat .val { font-size: 1.5em; font-weight: 700; color: var(--accent); }
.header-stat .label { color: var(--text-dim); font-size: 0.85em; }

.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; overflow-x: auto; }
.tab { padding: 12px 20px; cursor: pointer; color: var(--text-dim); font-size: 0.9em; font-weight: 500; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; user-select: none; }
.tab:hover { color: var(--text); background: var(--hover-overlay); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.content { max-width: 1200px; margin: 0 auto; padding: 20px; }
.page { display: none; }
.page.active { display: block; }

.phase-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.phase-tab { padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85em; font-weight: 500; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); transition: all .2s; user-select: none; }
.phase-tab:hover { border-color: var(--accent); color: var(--text); }
.phase-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.phase-tab .count { font-size: 0.8em; opacity: 0.7; margin-left: 4px; }

.topic-section { margin-bottom: 24px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
.topic-header { padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
.topic-header:hover { background: var(--hover-overlay2); }
.topic-header h3 { font-size: 1em; display: flex; align-items: center; gap: 8px; }
.topic-header .arrow { transition: transform .2s; font-size: 0.8em; color: var(--text-dim); }
.topic-header.open .arrow { transform: rotate(90deg); }
.topic-progress { display: flex; align-items: center; gap: 10px; font-size: 0.85em; }
.progress-bar { width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar .fill { height: 100%; border-radius: 3px; transition: width .3s; }
.topic-body { display: none; border-top: 1px solid var(--border); }
.topic-body.open { display: block; }

.pattern-guide { padding: 16px 20px; background: var(--guide-bg); border-bottom: 1px solid var(--border); font-size: 0.85em; line-height: 1.6; }
.pattern-guide h4 { color: var(--yellow); margin-bottom: 8px; font-size: 0.9em; }
.pattern-guide ul { padding-left: 18px; }
.pattern-guide li { margin-bottom: 4px; color: var(--text-dim); }
.pattern-guide code { background: var(--code-bg); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; color: var(--blue); }

.problem-table { width: 100%; border-collapse: collapse; }
.problem-table th { text-align: left; padding: 10px 16px; font-size: 0.8em; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--table-header-bg); }
.problem-table td { padding: 8px 16px; font-size: 0.88em; border-bottom: 1px solid var(--table-row-border); vertical-align: middle; }
.problem-table tr:hover td { background: var(--hover-overlay2); }
.problem-table tr.done td { opacity: 0.6; }
.problem-table tr.done .p-name { text-decoration: line-through; }

.check { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
.check:hover { border-color: var(--green); }
.check.checked { background: var(--green); border-color: var(--green); }
.check.checked::after { content: '\2713'; color: white; font-size: 14px; font-weight: 700; }

.rating { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; font-weight: 600; }
.rating.r800 { background: rgba(128,128,128,0.2); color: #999; }
.rating.r900 { background: rgba(128,128,128,0.2); color: #bbb; }
.rating.r1000 { background: rgba(0,128,0,0.15); color: #4caf50; }
.rating.r1100 { background: rgba(0,128,0,0.2); color: #66bb6a; }
.rating.r1200 { background: rgba(0,128,0,0.25); color: #81c784; }
.rating.r1300 { background: rgba(0,200,200,0.15); color: #26c6da; }
.rating.r1400 { background: rgba(0,200,200,0.2); color: #4dd0e1; }
.rating.r1500 { background: rgba(0,200,200,0.2); color: #4dd0e1; }
.rating.r1600 { background: rgba(68,138,255,0.2); color: #448aff; }
.rating.r1700,.rating.r1800 { background: rgba(68,138,255,0.25); color: #82b1ff; }
.rating.r1900,.rating.r2000 { background: rgba(170,0,255,0.2); color: #aa00ff; }

.tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.75em; margin-right: 3px; background: var(--tag-bg); color: var(--text-dim); }

.insight-input { background: transparent; border: 1px solid transparent; color: var(--text-dim); font-size: 0.85em; padding: 4px 8px; border-radius: 4px; width: 100%; min-width: 150px; }
.insight-input:focus { outline: none; border-color: var(--accent); background: var(--insight-focus-bg); color: var(--text); }
.insight-input::placeholder { color: var(--input-placeholder); }

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
.stat-card .stat-val { font-size: 2.2em; font-weight: 700; }
.stat-card .stat-label { color: var(--text-dim); font-size: 0.85em; margin-top: 4px; }
.stat-card.highlight { border-color: var(--accent); }
.stat-card.highlight .stat-val { color: var(--accent); }

.phase-progress-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.phase-progress-card h3 { margin-bottom: 12px; font-size: 1em; }
.bar-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.bar-label { min-width: 140px; font-size: 0.85em; color: var(--text-dim); }
.big-bar { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.big-bar .fill { height: 100%; border-radius: 5px; transition: width .3s; }
.bar-pct { min-width: 45px; text-align: right; font-size: 0.85em; font-weight: 600; }

.contest-log { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.contest-log h3 { margin-bottom: 12px; }
.contest-form { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.contest-form input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 0.85em; }
.contest-form input:focus { outline: none; border-color: var(--accent); }
.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all .2s; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { padding: 4px 10px; font-size: 0.8em; }
.btn-danger { background: rgba(233,69,96,0.15); color: var(--accent); border: 1px solid rgba(233,69,96,0.3); }
.btn-danger:hover { background: rgba(233,69,96,0.25); }
.contest-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--table-row-border); font-size: 0.85em; }
.delta.positive { color: var(--green); }
.delta.negative { color: var(--accent); }



.data-actions { display: flex; gap: 8px; align-items: center; }

.theme-selector { position: relative; }
.theme-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8em; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: all .2s; }
.theme-btn:hover { border-color: var(--accent); }
.theme-btn .theme-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid var(--border); }
.theme-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px 0; min-width: 180px; z-index: 1000; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.theme-dropdown.open { display: block; }
.theme-option { display: flex; align-items: center; gap: 10px; padding: 8px 16px; cursor: pointer; font-size: 0.82em; color: var(--text-dim); transition: all .15s; }
.theme-option:hover { background: var(--hover-overlay); color: var(--text); }
.theme-option.active { color: var(--accent); font-weight: 600; }
.theme-option .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }
.theme-option.active .dot { border-color: var(--accent); box-shadow: inset 0 0 0 3px var(--accent); }
.theme-option .swatch { display: flex; gap: 3px; margin-left: auto; }
.theme-option .swatch span { width: 8px; height: 8px; border-radius: 2px; }

.random-btn { background: var(--purple); color: white; border: none; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: all .2s; }
.random-btn:hover { opacity: 0.85; transform: scale(1.03); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; max-width: 520px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,0.5); animation: modalIn .2s ease-out; }
@keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal h2 { font-size: 1.1em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.modal .random-phase-filter { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
.modal .rp-btn { padding: 5px 12px; border-radius: 14px; cursor: pointer; font-size: 0.8em; font-weight: 500; border: 1px solid var(--border); background: var(--bg); color: var(--text-dim); transition: all .2s; }
.modal .rp-btn:hover { border-color: var(--accent); color: var(--text); }
.modal .rp-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.random-result { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.random-result .rr-name { font-size: 1em; font-weight: 600; margin-bottom: 6px; }
.random-result .rr-meta { font-size: 0.82em; color: var(--text-dim); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.random-result .rr-phase { font-size: 0.78em; color: var(--purple); font-weight: 500; }
.random-result .rr-topic { font-size: 0.78em; color: var(--yellow); }
.random-empty { color: var(--text-dim); font-size: 0.9em; padding: 20px 0; text-align: center; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions .btn { min-width: 90px; text-align: center; }

@media (max-width: 768px) {
  .header { flex-direction: column; gap: 12px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .contest-form { flex-direction: column; }
  .bar-label { min-width: 100px; font-size: 0.78em; }
}
</style>
</head>
<body>

<div class="header">
  <h1>&#127919; CF <span>Candidate Master</span> Tracker</h1>
  <div class="data-actions">
    <button class="random-btn" onclick="openRandomModal()">&#127922; Random</button>
    <button class="btn btn-primary btn-sm" onclick="exportData()">Export Data</button>
    <button class="btn btn-sm btn-danger" onclick="document.getElementById('importFile').click()">Import Data</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)" />
  </div>
  <div class="theme-selector">
    <button class="theme-btn" onclick="toggleThemeDropdown()" id="themeBtn">
      <span class="theme-dot" id="themeDot"></span>
      <span id="themeName">Midnight</span> ▾
    </button>
    <div class="theme-dropdown" id="themeDropdown"></div>
  </div>
  <div class="header-stats">
    <div class="header-stat"><div class="val" id="h-solved">0</div><div class="label">Solved</div></div>
    <div class="header-stat"><div class="val" id="h-phase">1</div><div class="label">Phase</div></div>
    <div class="header-stat"><div class="val" id="h-rating">&mdash;</div><div class="label">Rating</div></div>
    <div class="header-stat"><div class="val" id="h-pct">0%</div><div class="label">Overall</div></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="problems">Problems</div>
  <div class="tab" data-tab="progress">Progress</div>
  <div class="tab" data-tab="contests">Contests</div>
</div>

<div class="content">
<div class="page active" id="page-problems">
  <div class="phase-tabs" id="phaseTabs"></div>
  <div id="problemsContainer"></div>
</div>

<div class="page" id="page-progress">
  <div class="stats-grid" id="statsGrid"></div>
  <div id="phaseProgressCards"></div>
</div>

<div class="page" id="page-contests">
  <div class="contest-log">
    <h3>Log Contest Result</h3>
    <div class="contest-form">
      <input type="date" id="c-date" />
      <input type="text" id="c-name" placeholder="Contest name" style="min-width:200px" />
      <input type="number" id="c-before" placeholder="Before" style="width:80px" />
      <input type="number" id="c-after" placeholder="After" style="width:80px" />
      <input type="text" id="c-solved" placeholder="Solved (A,B,C)" style="width:120px" />
      <input type="text" id="c-notes" placeholder="Notes" style="min-width:160px" />
      <button class="btn btn-primary" onclick="addContest()">Add</button>
    </div>
    <div id="contestList"></div>
  </div>

//  STATE
// ═══════════════════════════════════════════════════════════
let state = { problems: {}, notes: "", contests: [], rating: "" };

function load() {
  try {
    const s = localStorage.getItem("cf-cm-tracker");
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) { console.error("Load error", e); }
  // Seed pre-done problems
  PHASES.forEach(ph => ph.topics.forEach(t => t.problems.forEach(p => {
    if (p.done && !state.problems[p.id])
      state.problems[p.id] = { done: true, insight: p.insight || "" };
  })));
}

function save() {
  try { localStorage.setItem("cf-cm-tracker", JSON.stringify(state)); } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
let activePhase = 1;
let openTopics = new Set();

function rc(r) {
  if (r >= 1900) return "r1900"; if (r >= 1700) return "r1700";
  if (r >= 1500) return "r1500"; if (r >= 1300) return "r1300";
  if (r >= 1100) return "r1100"; if (r >= 1000) return "r1000";
  if (r >= 900) return "r900"; return "r800";
}

function topicStats(t) {
  let n = t.problems.length, d = 0;
  t.problems.forEach(p => { if (state.problems[p.id] && state.problems[p.id].done) d++; });
  return { total: n, done: d };
}

function phaseStats(ph) {
  let n = 0, d = 0;
  ph.topics.forEach(t => { const s = topicStats(t); n += s.total; d += s.done; });
  return { total: n, done: d };
}

function allStats() {
  let n = 0, d = 0;
  PHASES.forEach(p => { const s = phaseStats(p); n += s.total; d += s.done; });
  return { total: n, done: d };
}

function escAttr(s) { return (s || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════
function renderPhaseTabs() {
  document.getElementById("phaseTabs").innerHTML = PHASES.map(p => {
    const s = phaseStats(p);
    return '<div class="phase-tab' + (p.id === activePhase ? ' active' : '') + '" onclick="switchPhase(' + p.id + ')">Phase ' + p.id + '<span class="count">(' + s.done + '/' + s.total + ')</span></div>';
  }).join("");
}

function renderProblems() {
  const ph = PHASES.find(p => p.id === activePhase);
  document.getElementById("problemsContainer").innerHTML = ph.topics.map(function(topic) {
    const st = topicStats(topic);
    const pct = st.total ? Math.round(st.done / st.total * 100) : 0;
    const col = pct === 100 ? "var(--green)" : pct > 50 ? "var(--yellow)" : "var(--blue)";

    let guide = "";
    if (topic.guide) {
      guide = '<div class="pattern-guide"><h4>\uD83D\uDCA1 ' + topic.guide.title + '</h4><ul>' +
        topic.guide.points.map(function(p) { return '<li>' + p + '</li>'; }).join("") + '</ul></div>';
    }

    let tbl = "";
    if (topic.problems.length) {
      tbl = '<table class="problem-table"><tr><th style="width:36px"></th><th>Problem</th><th style="width:60px">Rating</th><th>Tags</th><th>Key Insight</th></tr>' +
        topic.problems.map(function(p) {
          var pd = state.problems[p.id] || {};
          var d = pd.done;
          return '<tr class="' + (d ? "done" : "") + '">' +
            '<td><div class="check ' + (d ? "checked" : "") + '" onclick="toggleProblem(\'' + p.id + '\')"></div></td>' +
            '<td class="p-name"><a href="' + p.link + '" target="_blank">' + p.name + '</a></td>' +
            '<td><span class="rating ' + rc(p.rating) + '">' + p.rating + '</span></td>' +
            '<td>' + p.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join("") + '</td>' +
            '<td><input class="insight-input" placeholder="Write insight..." value="' + escAttr(pd.insight) + '" onchange="setInsight(\'' + p.id + '\',this.value)"/></td></tr>';
        }).join("") + '</table>';
    } else {
      tbl = '<div style="padding:20px;color:var(--text-dim);font-size:0.85em">Problems will be added as you reach this phase. Filter CF problemset by tag + rating.</div>';
    }

    var tKey = activePhase + ':' + topic.name;
    var isOpen = openTopics.has(tKey);
    return '<div class="topic-section" data-topic="' + escAttr(tKey) + '"><div class="topic-header' + (isOpen ? ' open' : '') + '" onclick="toggleTopic(this)">' +
      '<h3><span class="arrow">\u25B6</span> ' + topic.name + '</h3>' +
      '<div class="topic-progress"><span>' + st.done + '/' + st.total + '</span>' +
      '<div class="progress-bar"><div class="fill" style="width:' + pct + '%;background:' + col + '"></div></div>' +
      '<span>' + pct + '%</span></div></div>' +
      '<div class="topic-body' + (isOpen ? ' open' : '') + '">' + guide + tbl + '</div></div>';
  }).join("");
}

function renderProgress() {
  var a = allStats();
  var ap = a.total ? Math.round(a.done / a.total * 100) : 0;
  document.getElementById("statsGrid").innerHTML =
    '<div class="stat-card highlight"><div class="stat-val">' + a.done + '</div><div class="stat-label">Problems Solved</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + (a.total - a.done) + '</div><div class="stat-label">Remaining</div></div>' +
    '<div class="stat-card"><div class="stat-val">' + (state.rating || "\u2014") + '</div><div class="stat-label">CF Rating <span style="cursor:pointer" onclick="editRating()">\u270F\uFE0F</span></div></div>' +
    '<div class="stat-card"><div class="stat-val" style="color:' + (ap > 70 ? "var(--green)" : ap > 30 ? "var(--yellow)" : "var(--blue)") + '">' + ap + '%</div><div class="stat-label">Overall</div></div>';

  document.getElementById("phaseProgressCards").innerHTML = PHASES.map(function(ph) {
    var s = phaseStats(ph);
    return '<div class="phase-progress-card"><h3>' + ph.name + ' \u2192 Target: ' + ph.target + (s.total && s.done === s.total ? " \u2705" : "") + '</h3>' +
      ph.topics.map(function(t) {
        var ts2 = topicStats(t);
        var tp = ts2.total ? Math.round(ts2.done / ts2.total * 100) : 0;
        var c = tp === 100 ? "var(--green)" : tp > 50 ? "var(--yellow)" : "var(--blue)";
        var label = t.name.length > 28 ? t.name.substring(0, 28) + "\u2026" : t.name;
        return '<div class="bar-wrap"><div class="bar-label">' + label + '</div>' +
          '<div class="big-bar"><div class="fill" style="width:' + tp + '%;background:' + c + '"></div></div>' +
          '<div class="bar-pct">' + ts2.done + '/' + ts2.total + '</div></div>';
      }).join("") + '</div>';
  }).join("");
}

function renderContests() {
  var el = document.getElementById("contestList");
  if (!state.contests.length) {
    el.innerHTML = '<div style="color:var(--text-dim);padding:10px 0">No contests logged yet.</div>';
    return;
  }
  el.innerHTML = state.contests.slice().reverse().map(function(c, i) {
    var idx = state.contests.length - 1 - i;
    var d = c.after - c.before;
    return '<div class="contest-item"><div><strong>' + escAttr(c.name) + '</strong><br/>' +
      '<span style="color:var(--text-dim)">' + c.date + ' \u00B7 Solved: ' + escAttr(c.solved) + '</span>' +
      (c.notes ? '<br/><span style="color:var(--text-dim);font-size:0.8em">' + escAttr(c.notes) + '</span>' : '') +
      '</div><div style="text-align:right"><span>' + c.before + '\u2192' + c.after + '</span><br/>' +
      '<span class="delta ' + (d >= 0 ? "positive" : "negative") + '">' + (d >= 0 ? "+" : "") + d + '</span>' +
      ' <button class="btn btn-sm btn-danger" onclick="removeContest(' + idx + ')">\u00D7</button></div></div>';
  }).join("");
}

function renderHeader() {
  var a = allStats();
  document.getElementById("h-solved").textContent = a.done;
  document.getElementById("h-pct").textContent = a.total ? Math.round(a.done / a.total * 100) + "%" : "0%";
  document.getElementById("h-rating").textContent = state.rating || "\u2014";
  for (var i = PHASES.length - 1; i >= 0; i--) {
    if (phaseStats(PHASES[i]).done > 0) {
      document.getElementById("h-phase").textContent = PHASES[i].id;
      return;
    }
  }
  document.getElementById("h-phase").textContent = "1";
}

function renderAll() {
  renderPhaseTabs();
  renderProblems();
  renderProgress();
  renderContests();
  renderHeader();
}

// ═══════════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════════
function switchPhase(id) { activePhase = id; renderPhaseTabs(); renderProblems(); }

function toggleTopic(header) {
  header.classList.toggle("open");
  header.nextElementSibling.classList.toggle("open");
  var key = header.parentElement.getAttribute("data-topic");
  if (key) { openTopics.has(key) ? openTopics.delete(key) : openTopics.add(key); }
}

function toggleProblem(id) {
  if (!state.problems[id]) state.problems[id] = { done: false, insight: "" };
  state.problems[id].done = !state.problems[id].done;
  save(); renderAll();
}

function setInsight(id, val) {
  if (!state.problems[id]) state.problems[id] = { done: false, insight: "" };
  state.problems[id].insight = val;
  save();
}

function editRating() {
  var r = prompt("Enter your current Codeforces rating:", state.rating || "");
  if (r !== null) { state.rating = r; save(); renderAll(); }
}

function addContest() {
  var n = document.getElementById("c-name").value;
  if (!n) { alert("Enter contest name"); return; }
  state.contests.push({
    date: document.getElementById("c-date").value,
    name: n,
    before: parseInt(document.getElementById("c-before").value) || 0,
    after: parseInt(document.getElementById("c-after").value) || 0,
    solved: document.getElementById("c-solved").value,
    notes: document.getElementById("c-notes").value
  });
  state.rating = document.getElementById("c-after").value;
  save();
  ["c-date","c-name","c-before","c-after","c-solved","c-notes"].forEach(function(id) {
    document.getElementById(id).value = "";
  });
  renderAll();
}

function removeContest(i) {
  if (confirm("Remove this contest entry?")) {
    state.contests.splice(i, 1);
    save(); renderAll();
  }
}


// Tab switching
document.querySelectorAll(".tab").forEach(function(tab) {
  tab.addEventListener("click", function() {
    document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
    document.querySelectorAll(".page").forEach(function(p) { p.classList.remove("active"); });
    this.classList.add("active");
    document.getElementById("page-" + this.dataset.tab).classList.add("active");
  });
});

// Export / Import
function exportData() {
  var exportObj = { ...state, theme: currentTheme };
  var blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: "application/json" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cf-cm-tracker-backup.json";
  a.click();
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (imported.theme) { applyTheme(imported.theme); delete imported.theme; }
      state = { ...state, ...imported };
      save(); renderAll();
      alert("Data imported successfully!");
    } catch(err) { alert("Invalid file format"); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

let currentTheme = "midnight";

function loadTheme() {
  try {
    const saved = localStorage.getItem("cf-cm-theme");
    if (saved) currentTheme = saved;
  } catch(e) {}
  applyTheme(currentTheme);
}

function applyTheme(themeId) {
  currentTheme = themeId;
  document.documentElement.setAttribute("data-theme", themeId);
  try { localStorage.setItem("cf-cm-theme", themeId); } catch(e) {}

  var theme = THEMES.find(function(t) { return t.id === themeId; });
  if (theme) {
    var dot = document.getElementById("themeDot");
    var nameEl = document.getElementById("themeName");
    if (dot) dot.style.background = theme.colors[1];
    if (nameEl) nameEl.textContent = theme.name;
  }
  renderThemeDropdown();
}

function renderThemeDropdown() {
  var dd = document.getElementById("themeDropdown");
  if (!dd) return;
  dd.innerHTML = THEMES.map(function(t) {
    return '<div class="theme-option' + (t.id === currentTheme ? ' active' : '') + '" onclick="selectTheme(\'' + t.id + '\')">' +
      '<span class="dot"></span>' +
      '<span>' + t.name + '</span>' +
      '<span class="swatch">' +
        t.colors.map(function(c) { return '<span style="background:' + c + '"></span>'; }).join("") +
      '</span></div>';
  }).join("");
}

function toggleThemeDropdown() {
  var dd = document.getElementById("themeDropdown");
  dd.classList.toggle("open");
}

function selectTheme(id) {
  applyTheme(id);
  document.getElementById("themeDropdown").classList.remove("open");
}

// Close dropdown on outside click
document.addEventListener("click", function(e) {
  var sel = document.querySelector(".theme-selector");
  if (sel && !sel.contains(e.target)) {
    document.getElementById("themeDropdown").classList.remove("open");
  }
});

// ═══════════════════════════════════════════════════════════
//  RANDOM QUESTION PICKER
// ═══════════════════════════════════════════════════════════
let randomPhaseFilter = 0; // 0 = all phases

function openRandomModal() {
  renderRandomPhaseFilter();
  pickRandom();
  document.getElementById("randomModal").classList.add("open");
}

function closeRandomModal() {
  document.getElementById("randomModal").classList.remove("open");
}

function renderRandomPhaseFilter() {
  var html = '<div class="rp-btn' + (randomPhaseFilter === 0 ? ' active' : '') + '" onclick="setRandomPhase(0)">All Phases</div>';
  PHASES.forEach(function(p) {
    html += '<div class="rp-btn' + (randomPhaseFilter === p.id ? ' active' : '') + '" onclick="setRandomPhase(' + p.id + ')">Phase ' + p.id + '</div>';
  });
  document.getElementById("randomPhaseFilter").innerHTML = html;
}

function setRandomPhase(id) {
  randomPhaseFilter = id;
  renderRandomPhaseFilter();
  pickRandom();
}

function pickRandom() {
  var pool = [];
  var phases = randomPhaseFilter === 0 ? PHASES : PHASES.filter(function(p) { return p.id === randomPhaseFilter; });
  phases.forEach(function(ph) {
    ph.topics.forEach(function(t) {
      t.problems.forEach(function(p) {
        var pd = state.problems[p.id];
        if (!pd || !pd.done) {
          pool.push({ problem: p, phase: ph, topic: t });
        }
      });
    });
  });

  var el = document.getElementById("randomResult");
  if (pool.length === 0) {
    el.innerHTML = '<div class="random-empty">\uD83C\uDF89 All problems solved' + (randomPhaseFilter ? ' in Phase ' + randomPhaseFilter : '') + '!</div>';
    return;
  }

  var pick = pool[Math.floor(Math.random() * pool.length)];
  var p = pick.problem;
  el.innerHTML = '<div class="random-result">' +
    '<div class="rr-phase">Phase ' + pick.phase.id + ' \u2022 ' + pick.phase.name + '</div>' +
    '<div class="rr-topic">' + pick.topic.name + '</div>' +
    '<div class="rr-name"><a href="' + p.link + '" target="_blank">' + p.name + '</a></div>' +
    '<div class="rr-meta">' +
      '<span class="rating ' + rc(p.rating) + '">' + p.rating + '</span>' +
      p.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join("") +
    '</div></div>';
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeRandomModal();
});

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
loadTheme();
load();
renderAll();
</script>
</body>
</html>
